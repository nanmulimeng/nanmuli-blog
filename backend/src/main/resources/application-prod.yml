spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:nanmuli_blog}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 20000
      idle-timeout: 300000
      max-lifetime: 1200000
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DB:0}
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
  sql:
    init:
      mode: never

# Sa-Token Redis 配置（生产环境，与业务 Redis 独立数据库）
sa-token:
  alone-redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
    database: 1
    timeout: 10s
    lettuce:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 0

# 异步任务执行器（Web Collector 用）
async:
  executor:
    crawler:
      core-pool-size: 2
      max-pool-size: 5
      queue-capacity: 50
      thread-name-prefix: crawler-

# 生产环境禁用API文档
knife4j:
  enable: false

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

# 博客业务配置
blog:
  file:
    upload-path: /opt/nanmuli-blog/uploads
    access-url: /uploads/

# 爬虫服务配置
crawler:
  service:
    base-url: ${CRAWLER_SERVICE_URL:http://localhost:8500}
    timeout: 180000  # 180秒超时（多关键词搜索+爬取需要更长时间）

logging:
  level:
    root: warn
    com.nanmuli.blog: info
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] [%X{traceId}] %-5level %logger{36} - %msg%n"
  file:
    name: /opt/nanmuli-blog/logs/blog.log
    max-size: 100MB
    max-history: 30
