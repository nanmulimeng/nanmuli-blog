spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:nanmuli_blog}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 20000
      idle-timeout: 300000
      max-lifetime: 1200000
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DB:0}
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
  sql:
    init:
      mode: never

# Sa-Token Redis 配置（生产环境，与业务 Redis 独立数据库）
sa-token:
  alone-redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
    database: 1
    timeout: 10s
    lettuce:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 0

# 生产环境禁用API文档
knife4j:
  enable: false

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

# 博客业务配置
blog:
  cache:
    ttl:
      default-duration: 1h
      article: 30m
      article-list: 10m
      article-top: 10m
      category: 2h
      tag: 2h
      config: 24h
      article-archive: 1h
      article-stats: 5m
  file:
    upload-path: /opt/nanmuli-blog/uploads
    access-url: /uploads/

# 爬虫服务配置
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:https://nanmuli.com,https://www.nanmuli.com}
  max-age: 3600
  allowed-methods: GET,POST,PUT,DELETE,OPTIONS
crawler:
  service:
    base-url: ${CRAWLER_SERVICE_URL:http://localhost:8500}
    api-key: ${CRAWLER_API_KEY:}
    connect-timeout: ${CRAWLER_CONNECT_TIMEOUT:10000}
    read-timeout: ${CRAWLER_READ_TIMEOUT:30000}
  callback:
    api-key: ${CRAWLER_CALLBACK_API_KEY:}
  http:
    pool:
      max-total: 20
      max-per-route: 10

