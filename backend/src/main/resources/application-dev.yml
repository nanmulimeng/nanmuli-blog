spring:
  datasource:
    url: jdbc:postgresql://localhost:5433/nanmuli_blog
    username: postgres
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 20000
      idle-timeout: 300000
      max-lifetime: 1200000
  data:
    redis:
      host: localhost
      port: 6380
      database: 0
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

# Sa-Token Redis 配置（开发环境）
sa-token:
  alone-redis:
    host: localhost
    port: 6380
    database: 1
    timeout: 10s
    lettuce:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 0

# 缓存 TTL 配置
blog:
  cache:
    ttl:
      default-duration: 1h
      article: 30m
      article-list: 10m
      article-top: 10m
      category: 2h
      tag: 2h
      config: 24h
      article-archive: 1h
      article-stats: 5m

# Web Collector - Python 爬虫服务配置
crawler:
  service:
    base-url: http://localhost:8500
    api-key: ${CRAWLER_API_KEY:}
    connect-timeout: ${CRAWLER_CONNECT_TIMEOUT:10000}
    read-timeout: ${CRAWLER_READ_TIMEOUT:30000}
  callback:
    api-key: ${CRAWLER_CALLBACK_API_KEY:}
  http:
    pool:
      max-total: 20
      max-per-route: 10

logging:
  level:
    root: info
    com.nanmuli.blog: debug
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] [%X{traceId}] %-5level %logger{36} - %msg%n"

# CORS 配置
cors:
  max-age: 3600
  allowed-methods: GET,POST,PUT,DELETE,OPTIONS
