spring:
  datasource:
    url: jdbc:postgresql://localhost:5433/nanmuli_blog
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 20000
      idle-timeout: 300000
      max-lifetime: 1200000
  data:
    redis:
      host: localhost
      port: 6380
      database: 0
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

# Sa-Token Redis 配置（开发环境）
sa-token:
  alone-redis:
    host: localhost
    port: 6380
    database: 1
    timeout: 10s
    lettuce:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 0

# Web Collector - Crawl4AI 服务配置
crawler:
  service:
    base-url: http://localhost:8500
    api-key: ${CRAWLER_API_KEY:}  # Python 服务间认证 key

logging:
  level:
    root: info
    com.nanmuli.blog: debug
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] [%X{traceId}] %-5level %logger{36} - %msg%n"
