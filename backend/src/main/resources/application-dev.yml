spring:
  datasource:
    url: jdbc:postgresql://localhost:5433/nanmuli_blog
    username: postgres
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 20000
      idle-timeout: 300000
      max-lifetime: 1200000
  data:
    redis:
      host: localhost
      port: 6380
      database: 0
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

# Sa-Token Redis 配置（开发环境）
sa-token:
  alone-redis:
    host: localhost
    port: 6380
    database: 1
    timeout: 10s
    lettuce:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 0

# 缓存 TTL 配置
blog:
  cache:
    ttl:
      default-duration: 1h
      article: 30m
      article-list: 10m
      article-top: 10m
      category: 2h
      tag: 2h
      config: 24h
      article-archive: 1h
      article-stats: 5m

# ===== 以下配置已迁移至 sys_config 表（Phase 2） =====
# crawler.service.* → sys_config (base-url/api-key/connect-timeout/read-timeout)
# crawler.callback.* → sys_config (api-key)
# crawler.http.pool.* → sys_config (max-total/max-per-route)
# blog.security.*     → sys_config (encryption-key)
#
# 运行时通过 PUT /api/admin/config/{key} 修改，POST /api/admin/config/refresh 生效
# 环境变量覆盖仍可用: CRAWLER_API_KEY, CRAWLER_CONNECT_TIMEOUT, CRAWLER_READ_TIMEOUT, CRAWLER_CALLBACK_API_KEY

# Mihomo (Clash Meta) REST API — 仅服务器可用，本地 Clash Verge 锁定 external-controller
mihomo:
  api:
    url: http://127.0.0.1:9090

# CORS 配置
cors:
  max-age: 3600
  allowed-methods: GET,POST,PUT,DELETE,OPTIONS
