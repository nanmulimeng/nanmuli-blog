spring:
  application:
    name: nanmuli-blog
  profiles:
    active: dev
  cache:
    type: redis
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB
  sql:
    init:
      mode: always
      data-locations: classpath:data.sql

server:
  port: 8081
  compression:
    enabled: true

# Sa-Token 配置
sa-token:
  token-name: Authorization
  timeout: 2592000
  active-timeout: -1
  is-concurrent: true
  is-share: false
  token-style: uuid
  is-log: false
  # Redis 持久化配置 - 与Spring Redis使用相同配置
  alone-redis:
    host: localhost
    port: 6380  # 与application-dev.yml保持一致
    database: 1  # 使用不同的数据库，避免与业务数据冲突
    timeout: 10s
    lettuce:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 0

# MyBatis-Plus
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      logic-delete-field: isDeleted
      logic-delete-value: true
      logic-not-delete-value: false
      id-type: assign_id
  mapper-locations: classpath*:/mapper/**/*.xml

# 博客业务配置
blog:
  file:
    upload-path: ./uploads
    access-url: /uploads/
  ai:
    enabled: false
    model: qwen-turbo
    auto-tags: true
    auto-summary: true
