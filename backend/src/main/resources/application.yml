spring:
  application:
    name: nanmuli-blog
  profiles:
    active: dev
  cache:
    type: redis
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB
  sql:
    init:
      mode: always
      data-locations: classpath:data.sql
  jackson:
    time-zone: Asia/Shanghai
    date-format: yyyy-MM-dd HH:mm:ss

server:
  port: 8081
  compression:
    enabled: true

# Sa-Token 配置
sa-token:
  token-name: satoken
  timeout: 2592000
  active-timeout: 1800      # 30分钟无活动过期（从-1改为1800秒）
  is-concurrent: false      # 单点登录（从true改为false）
  is-share: false
  token-style: uuid
  is-log: false
  # Cookie模式配置 - 防止XSS盗取Token
  token-from-cookie: true
  cookie:
    http-only: true
    secure: false
    same-site: Lax
  # Redis 持久化配置 - 各环境在 application-{profile}.yml 中覆盖

# MyBatis-Plus
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      logic-delete-field: isDeleted
      logic-delete-value: true
      logic-not-delete-value: false
      id-type: assign_id
  mapper-locations: classpath*:/mapper/**/*.xml

# 博客业务配置
blog:
  file:
    upload-path: ./uploads
    access-url: /uploads/
    max-size: 10MB
    allowed-extensions: jpg,jpeg,png,gif,webp,svg,txt,md,pdf,zip,rar,7z
    storage-type: local
