services:
  # PostgreSQL 数据库 (含 pgvector + zhparser 扩展)
  postgres:
    build:
      context: ./db
      dockerfile: Dockerfile
    image: nanmuli-postgres:pgvector-zhparser
    container_name: nanmuli-postgres
    restart: always
    environment:
      POSTGRES_DB: nanmuli_blog
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      LANG: C.UTF-8
      LC_ALL: C.UTF-8
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init-scripts:/docker-entrypoint-initdb.d
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: nanmuli-redis
    restart: always
    command: redis-server --maxmemory 100mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Python 爬虫服务 (Crawl4AI)
  crawler:
    build:
      context: ../crawler-service
      dockerfile: Dockerfile
    container_name: nanmuli-crawler
    restart: always
    environment:
      - PORT=8500
      - HOST=0.0.0.0
      - MAX_PAGES_DEFAULT=10
      - MAX_PAGES_LIMIT=20
      - MAX_DEPTH_LIMIT=3
      - REQUEST_TIMEOUT=60
      - LOG_LEVEL=INFO
    ports:
      - "8500:8500"
    networks:
      - nanmuli-network

networks:
  nanmuli-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
